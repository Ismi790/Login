<body>

<div class="card" id="appCard">
    <!-- Brand -->
    <div class="brand">
        <i class="fas fa-graduation-cap"></i>
        <h1>Edu<span>Space</span></h1>
    </div>

    <!-- Login Form -->
    <div class="login-box" id="loginSection">
        <form id="loginForm" autocomplete="off">
            <div class="input-group">
                <i class="fas fa-user-astronaut"></i>
                <input type="text" id="nameInput" placeholder="Masukkan nama Anda" required>
                <button type="submit" id="loginBtn">
                    <i class="fas fa-rocket"></i> Masuk
                </button>
            </div>
        </form>
    </div>

    <!-- Greeting & logout (hidden by default) -->
    <div id="greetingSection" class="greeting" style="display: none;">
        <div class="user">
            <i class="fas fa-user-circle"></i>
            <span id="displayName">User</span>
            <small>· aktif</small>
        </div>
        <button id="logoutBtn" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i> Keluar
        </button>
    </div>

    <!-- Menu: Quiz & Materi -->
    <div class="menu-grid" id="menuGrid">
        <!-- Quiz -->
        <a href="#" class="menu-item" id="quizMenu">
            <i class="fas fa-brain"></i>
            <h3>Quiz</h3>
            <p>Uji pemahamanmu</p>
        </a>
        <!-- Materi -->
        <a href="#" class="menu-item" id="materiMenu">
            <i class="fas fa-book-open"></i>
            <h3>Materi</h3>
            <p>Kosongkan pikiran</p>
        </a>
    </div>

    <!-- status / informasi -->
    <div class="login-status" id="statusMessage">
        <i class="fas fa-circle" style="color: #4f6f8f; font-size: 0.5rem;"></i> 
        <span id="statusText">Belum login · silakan masukkan nama</span>
    </div>
</div>

<script>
    (function() {
        // DOM elements
        const loginForm = document.getElementById('loginForm');
        const nameInput = document.getElementById('nameInput');
        const loginSection = document.getElementById('loginSection');
        const greetingSection = document.getElementById('greetingSection');
        const displayName = document.getElementById('displayName');
        const logoutBtn = document.getElementById('logoutBtn');
        const statusText = document.getElementById('statusText');
        const quizMenu = document.getElementById('quizMenu');
        const materiMenu = document.getElementById('materiMenu');

        // State
        let currentUser = '';

        // --- Helper update UI ---
        function updateUI(userName) {
            if (userName && userName.trim() !== '') {
                // Tampilan login
                loginSection.style.display = 'none';
                greetingSection.style.display = 'flex';
                displayName.textContent = userName.trim();
                statusText.innerHTML = `<i class="fas fa-check-circle" style="color: #6fcf97;"></i> Login sebagai <strong>${userName.trim()}</strong>`;
                // aktifkan menu (hilangkan class disabled)
                quizMenu.classList.remove('disabled');
                materiMenu.classList.remove('disabled');
                // ubah cursor & pointer
                quizMenu.style.cursor = 'pointer';
                materiMenu.style.cursor = 'pointer';
                // set href agar tidak reload (tetap di halaman)
                quizMenu.href = '#';
                materiMenu.href = '#';
            } else {
                // Reset ke tampilan login
                loginSection.style.display = 'block';
                greetingSection.style.display = 'none';
                nameInput.value = '';
                statusText.innerHTML = `<i class="fas fa-circle" style="color: #4f6f8f; font-size: 0.5rem;"></i> Belum login · silakan masukkan nama`;
                // non-aktifkan menu (disabled style)
                quizMenu.classList.add('disabled');
                materiMenu.classList.add('disabled');
                quizMenu.style.cursor = 'default';
                materiMenu.style.cursor = 'default';
                // kosongkan href agar tidak navigasi
                quizMenu.href = '#';
                materiMenu.href = '#';
            }
        }

        // --- Login handler ---
        function handleLogin(e) {
            e.preventDefault();
            const rawName = nameInput.value.trim();
            if (rawName === '') {
                statusText.innerHTML = `<i class="fas fa-exclamation-triangle" style="color: #f1c40f;"></i> Nama tidak boleh kosong!`;
                return;
            }
            currentUser = rawName;
            updateUI(currentUser);
            // sedikit efek sukses
            statusText.innerHTML = `<i class="fas fa-check-circle" style="color: #6fcf97;"></i> Selamat datang, <strong>${currentUser}</strong>!`;
        }

        // --- Logout ---
        function handleLogout() {
            currentUser = '';
            updateUI('');
            statusText.innerHTML = `<i class="fas fa-arrow-right" style="color: #8aa4ff;"></i> Berhasil keluar. Sampai jumpa!`;
            nameInput.focus();
        }

        // --- Menu Quiz ---
        function handleQuiz(e) {
            if (!currentUser || currentUser.trim() === '') {
                e.preventDefault();
                statusText.innerHTML = `<i class="fas fa-lock" style="color: #e67e22;"></i> Silakan login terlebih dahulu untuk mengakses Quiz.`;
                return;
            }
            // Jika sudah login, tampilkan pesan interaktif (karena materi & quiz hanya demo)
            e.preventDefault();
            statusText.innerHTML = `<i class="fas fa-question-circle" style="color: #f39c12;"></i> Halaman Quiz untuk <strong>${currentUser}</strong> · (konten kosong)`;
            // efek visual
            quizMenu.style.background = 'rgba(124, 155, 255, 0.12)';
            setTimeout(() => { quizMenu.style.background = ''; }, 400);
        }

        // --- Menu Materi ---
        function handleMateri(e) {
            if (!currentUser || currentUser.trim() === '') {
                e.preventDefault();
                statusText.innerHTML = `<i class="fas fa-lock" style="color: #e67e22;"></i> Silakan login terlebih dahulu untuk melihat Materi.`;
                return;
            }
            e.preventDefault();
            statusText.innerHTML = `<i class="fas fa-book" style="color: #3498db;"></i> Materi untuk <strong>${currentUser}</strong> · (kosong, siap diisi)`;
            materiMenu.style.background = 'rgba(52, 152, 219, 0.12)';
            setTimeout(() => { materiMenu.style.background = ''; }, 400);
        }

        // --- Inisialisasi & event listeners ---
        function init() {
            // State awal: belum login
            updateUI('');

            // Login form
            loginForm.addEventListener('submit', handleLogin);

            // Logout
            logoutBtn.addEventListener('click', handleLogout);

            // Menu quiz & materi
            quizMenu.addEventListener('click', handleQuiz);
            materiMenu.addEventListener('click', handleMateri);

            // Jika user tekan enter di input (sudah ditangani form)
            // tambahan: klik di luar
        }

        // jalankan
        init();
    })();
</script>

</body>
</html>
